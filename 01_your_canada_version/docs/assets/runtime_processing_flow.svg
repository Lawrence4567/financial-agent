<svg width="1480" height="640" viewBox="0 0 1480 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Runtime Processing Flow</title>
  <desc id="desc">Single-request lifecycle from UI entry through validation, intent parsing, planning, tools, evidence validation, generation, and compliance.</desc>
  <defs>
    <style>
      .bg { fill: #0f1115; }
      .title { fill: #f3f4f6; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 600; }
      .subtitle { fill: #9ca3af; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .box { fill: #1f1f1f; stroke: #d4d4d8; stroke-width: 2; rx: 12; }
      .text { fill: #f3f4f6; font-family: Segoe UI, Arial, sans-serif; font-size: 16px; text-anchor: middle; dominant-baseline: middle; }
      .text-small { fill: #f3f4f6; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; text-anchor: middle; }
      .arrow { fill: none; stroke: #d4d4d8; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="5.8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 7 3.5 L 0 7 z" fill="#d4d4d8" />
    </marker>
  </defs>

  <rect class="bg" width="1480" height="640" />

  <text class="title" x="70" y="48">Runtime Processing Flow</text>
  <text class="subtitle" x="70" y="74">Single-request lifecycle from UI entry to final grounded response</text>

  <rect class="box" x="70" y="110" width="270" height="78" />
  <rect class="box" x="390" y="110" width="270" height="78" />
  <rect class="box" x="710" y="110" width="270" height="78" />
  <rect class="box" x="1030" y="110" width="270" height="78" />

  <text class="text" x="205" y="149">User + Streamlit UI</text>
  <text class="text-small" x="525" y="141">
    <tspan x="525" dy="0">Internal Request Record</tspan>
    <tspan x="525" dy="18">+ Minimal Identity Load</tspan>
  </text>
  <text class="text-small" x="845" y="141">
    <tspan x="845" dy="0">Identity / Access Check</tspan>
    <tspan x="845" dy="18">+ Early Safety Screen</tspan>
  </text>
  <text class="text" x="1165" y="149">Load Full Local Data</text>

  <rect class="box" x="1030" y="285" width="270" height="78" />
  <rect class="box" x="710" y="285" width="270" height="78" />
  <rect class="box" x="390" y="285" width="270" height="78" />
  <rect class="box" x="70" y="285" width="270" height="78" />

  <text class="text" x="1165" y="324">Choose Workflow Backend</text>
  <text class="text" x="845" y="324">Parse Intent</text>
  <text class="text" x="525" y="324">Plan Capabilities</text>
  <text class="text" x="205" y="324">Gather Context</text>

  <rect class="box" x="70" y="460" width="270" height="78" />
  <rect class="box" x="390" y="460" width="270" height="78" />
  <rect class="box" x="710" y="460" width="270" height="78" />
  <rect class="box" x="1030" y="460" width="270" height="78" />

  <text class="text" x="205" y="499">Run Deterministic Tools</text>
  <text class="text" x="525" y="499">Validate Evidence</text>
  <text class="text" x="845" y="499">Generate Answer</text>
  <text class="text-small" x="1165" y="491">
    <tspan x="1165" dy="0">Compliance Review</tspan>
    <tspan x="1165" dy="18">+ Audit + Final Response</tspan>
  </text>

  <path class="arrow" d="M 340 149 L 390 149" />
  <path class="arrow" d="M 660 149 L 710 149" />
  <path class="arrow" d="M 980 149 L 1030 149" />
  <path class="arrow" d="M 1165 188 L 1165 285" />
  <path class="arrow" d="M 1030 324 L 980 324" />
  <path class="arrow" d="M 710 324 L 660 324" />
  <path class="arrow" d="M 390 324 L 340 324" />
  <path class="arrow" d="M 205 363 L 205 460" />
  <path class="arrow" d="M 340 499 L 390 499" />
  <path class="arrow" d="M 660 499 L 710 499" />
  <path class="arrow" d="M 980 499 L 1030 499" />
</svg>
