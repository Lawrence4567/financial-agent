<svg width="1180" height="420" viewBox="0 0 1180 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RAG Query-Time Retrieval Flow</title>
  <desc id="desc">Online retrieval flow from user query through index load, retrieval mode choice, ranking, and retrieved context.</desc>
  <defs>
    <style>
      .bg { fill: #0f1115; }
      .title { fill: #f3f4f6; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 600; }
      .subtitle { fill: #9ca3af; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .box { fill: #1f1f1f; stroke: #d4d4d8; stroke-width: 2; rx: 12; }
      .decision { fill: #171923; stroke: #d4d4d8; stroke-width: 2; }
      .text { fill: #f3f4f6; font-family: Segoe UI, Arial, sans-serif; font-size: 16px; text-anchor: middle; dominant-baseline: middle; }
      .text-small { fill: #f3f4f6; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; text-anchor: middle; }
      .arrow { fill: none; stroke: #d4d4d8; stroke-width: 1.9; marker-end: url(#arrowhead); }
      .arrow-soft { fill: none; stroke: #d4d4d8; stroke-width: 1.9; marker-end: url(#arrowhead); }
      .label { fill: #f3f4f6; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="5.8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 7 3.5 L 0 7 z" fill="#d4d4d8" /></marker>
  </defs>
  <rect class="bg" width="1180" height="420" />
  <text class="title" x="70" y="48">RAG Query-Time Retrieval Flow</text>
  <text class="subtitle" x="70" y="74">Online search path for finding the best chunks for answer generation</text>
  <rect class="box" x="70" y="170" width="160" height="76" />
  <rect class="box" x="290" y="170" width="180" height="76" />
  <polygon class="decision" points="600,150 690,208 600,266 510,208" />
  <rect class="box" x="760" y="100" width="180" height="76" />
  <rect class="box" x="760" y="240" width="180" height="76" />
  <rect class="box" x="990" y="170" width="140" height="76" />
  <text class="text" x="150" y="208">User Query</text>
  <text class="text-small" x="380" y="198"><tspan x="380" dy="0">Load or Rebuild</tspan><tspan x="380" dy="18">Local Index</tspan></text>
  <text class="text" x="600" y="208">Retrieval Mode</text>
  <text class="text-small" x="850" y="128"><tspan x="850" dy="0">semantic + lexical</tspan><tspan x="850" dy="18">+ entity bonus</tspan></text>
  <text class="text-small" x="850" y="268"><tspan x="850" dy="0">lexical</tspan><tspan x="850" dy="18">score only</tspan></text>
  <text class="text-small" x="1060" y="198"><tspan x="1060" dy="0">Top-k Retrieved</tspan><tspan x="1060" dy="18">Context</tspan></text>
  <path class="arrow" d="M 230 208 L 290 208" />
  <path class="arrow" d="M 470 208 L 510 208" />
  <path class="arrow-soft" d="M 650 168 L 748 130" />
  <path class="arrow-soft" d="M 650 248 L 748 286" />
  <path class="arrow" d="M 940 148 L 978 188" />
  <path class="arrow" d="M 940 268 L 978 228" />
  <text class="label" x="780" y="114">Embedding</text>
  <text class="label" x="775" y="320">Fallback</text>
</svg>
